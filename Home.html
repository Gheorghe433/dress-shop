<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magazinul Meu</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style1.css">
</head>
<body>
  <aside class="sidebar">
      <ul class="side-nav">
        <li><a href="Home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="Contact.html">Contact</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="wishlist.html">Wishlist</a></li>
      </ul>
    </aside>

  <main class="page">
    <header class="navbar">
      <div class="navbar-actions" style="display:flex; align-items:center; gap:12px; margin-left:auto;">
        <div class="search-box" style="display:flex; align-items:center; gap:6px;">
          <input type="text" id="search-input" placeholder="Caută produse" style="padding:8px 10px; border-radius:8px; border:1px solid #ccc;">
          <button type="button" style="padding:8px 10px; border-radius:8px; border:none; cursor:pointer; background:var(--accent-bg); color:var(--accent-foreground);">🔍</button>
        </div>

        <button id="cart-btn" type="button" style="position:relative; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; background:var(--accent-bg); color:var(--accent-foreground);">
          🛒
          <span id="cart-badge" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px; display:none;">0</span>
        </button>
      </div>
    </header>

    <h1>Home</h1>

    <div class="category-filter">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="shirts"> Shirts</button>
      <button class="filter-btn" data-category="pants">Pants</button>
      <button class="filter-btn" data-category="shoes">
        Shoes</button>
    </div>

    <div id="loading-spinner" class="loading-spinner hidden">
      <div class="spinner"></div>
      <p>Se încarcă produsele...</p>
    </div>

    <div id="error-message" class="error-message hidden">
      <p id="error-text"></p>
      <button onclick="location.reload()">Încearcă din nou</button>
    </div>

    <div class="produse" id="products-container"></div>

    <div id="cart-panel" style="display:none; position:fixed; top:0; right:0; width:340px; max-width:90vw; height:100vh; background:rgba(255,255,255,0.98); backdrop-filter:blur(10px); box-shadow:-10px 0 40px rgba(0,0,0,0.2); z-index:9999; overflow-y:auto; padding:20px; gap:16px; flex-direction:column;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="margin:0; font-size:1.25rem;">Coș de cumpărături</h2>
        <button id="close-cart-btn" type="button" style="border:none; background:none; font-size:1.5rem; cursor:pointer; line-height:1;">×</button>
      </div>
      <div id="cart-items" style="display:grid; gap:12px; min-height:120px; color:#111;"></div>
      <div style="margin-top:auto;">
        <p style="font-weight:700; margin-bottom:12px;">Total produse: <span id="cart-total">0</span></p>
        <button id="clear-cart-btn" type="button" style="width:100%; padding:12px 14px; border-radius:10px; border:none; cursor:pointer; background:#111; color:#fff;">Golește coșul</button>
      </div>
    </div>

    <script src="api.js"></script>
    <script src="wishlist.js"></script>
    <script src="cart.js"></script>
    <script src="home-content.js"></script>
    <script>
      const container = document.getElementById('products-container');
      const loadingSpinner = document.getElementById('loading-spinner');
      const errorMessage = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');
      let allProductsData = null;

      const categoryNames = {
        shirts: ' Shirts',
        pants: 'Pants',
        shoes: ' Shoes'
      };

      async function loadProducts(selectedCategory = null) {
        try {
          loadingSpinner.classList.remove('hidden');
          errorMessage.classList.add('hidden');
          container.innerHTML = '';

          if (!allProductsData) {
            allProductsData = await API.getAllProducts();
          }

          loadingSpinner.classList.add('hidden');

          const categoriesToShow = selectedCategory && selectedCategory !== 'all'
            ? { [selectedCategory]: allProductsData[selectedCategory] }
            : allProductsData;

          Object.keys(categoriesToShow).forEach(categoryKey => {
            const categorySection = document.createElement('div');
            categorySection.className = 'category-section';

            const categoryTitle = document.createElement('h2');
            categoryTitle.className = 'category-title';
            categoryTitle.textContent = categoryNames[categoryKey];
            categorySection.appendChild(categoryTitle);

            const productsGrid = document.createElement('div');
            productsGrid.className = 'products-grid';

            categoriesToShow[categoryKey].forEach(product => {
              const card = document.createElement('div');
              card.className = 'produs';
              card.innerHTML = `
                <img src="${product.img}" alt="${product.name.trim()}" loading="lazy">
                <h3>Ralph Lauren</h3>
                <p>${product.desc.trim()}</p>
                <p><strong>Preț: ${product.price.trim()}</strong></p>
                <div style="display:flex; gap:8px; align-items:center;">
                  <button class="buy-btn" data-product-id="${product.id}">buy now</button>
                  <button class="wishlist-btn" data-product-id="${product.id}" style="background:none; border:none; cursor:pointer; font-size:20px; padding:8px;">🤍</button>
                </div>
                <div class="size-menu" data-product-id="${product.id}" style="display:none; flex-wrap:wrap; gap:8px; margin-top:10px;">
                  <button type="button" class="size-option" data-product-id="${product.id}" data-size="XS" style="padding:6px 10px; border-radius:8px; border:1px solid #ccc; background:#fff; color:#111; cursor:pointer;">XS</button>
                  <button type="button" class="size-option" data-product-id="${product.id}" data-size="S" style="padding:6px 10px; border-radius:8px; border:1px solid #ccc; background:#fff; color:#111; cursor:pointer;">S</button>
                  <button type="button" class="size-option" data-product-id="${product.id}" data-size="M" style="padding:6px 10px; border-radius:8px; border:1px solid #ccc; background:#fff; color:#111; cursor:pointer;">M</button>
                  <button type="button" class="size-option" data-product-id="${product.id}" data-size="L" style="padding:6px 10px; border-radius:8px; border:1px solid #ccc; background:#fff; color:#111; cursor:pointer;">L</button>
                  <button type="button" class="size-option" data-product-id="${product.id}" data-size="XL" style="padding:6px 10px; border-radius:8px; border:1px solid #ccc; background:#fff; color:#111; cursor:pointer;">XL</button>
                  <button type="button" class="cancel-size" data-product-id="${product.id}" style="background:none; border:none; color:#555; text-decoration:underline; cursor:pointer; padding:0;">Anulează</button>
                </div>
              `;
              productsGrid.appendChild(card);
            });

            categorySection.appendChild(productsGrid);
            container.appendChild(categorySection);
          });

          document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const productId = parseInt(this.dataset.productId);
              const sizeMenu = document.querySelector(`.size-menu[data-product-id="${productId}"]`);
              if (sizeMenu) {
                sizeMenu.style.display = 'flex';
              }
            });
          });

          document.querySelectorAll('.size-option').forEach(btn => {
            btn.addEventListener('click', function() {
              const productId = parseInt(this.dataset.productId);
              const selectedSize = this.dataset.size || 'M';
              let product = null;
              Object.values(allProductsData).forEach(category => {
                const found = category.find(p => p.id === productId);
                if (found) product = found;
              });
              if (product) {
                cart.addItem(productId, product, selectedSize);
              }
              const sizeMenu = document.querySelector(`.size-menu[data-product-id="${productId}"]`);
              if (sizeMenu) {
                sizeMenu.style.display = 'none';
              }
            });
          });

          document.querySelectorAll('.cancel-size').forEach(btn => {
            btn.addEventListener('click', function() {
              const productId = parseInt(this.dataset.productId);
              const sizeMenu = document.querySelector(`.size-menu[data-product-id="${productId}"]`);
              if (sizeMenu) {
                sizeMenu.style.display = 'none';
              }
            });
          });

          // Update wishlist hearts
          wishlist.updateHearts();

          document.querySelectorAll('.wishlist-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const productId = parseInt(this.dataset.productId);
              // Find product details
              let product = null;
              Object.values(allProductsData).forEach(category => {
                const found = category.find(p => p.id === productId);
                if (found) product = found;
              });
              if (product) {
                wishlist.toggleItem(productId, product);
              }
            });
          });

        } catch (error) {
          console.error('Error loading products:', error);
          loadingSpinner.classList.add('hidden');
          errorMessage.classList.remove('hidden');
          errorText.textContent = 'Eroare la încărcarea produselor: ' + error.message;
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        
        const params = new URLSearchParams(window.location.search);
        const urlCategory = params.get('category');
        const urlSearch   = params.get('search');

        if (urlCategory) {
          
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.category === urlCategory);
          });
          loadProducts(urlCategory);
        } else if (urlSearch) {
          
          loadProducts().then(() => {
            const q = urlSearch.toLowerCase();
            document.querySelectorAll('.products-grid .produs').forEach(card => {
              const text = card.innerText.toLowerCase();
              card.style.display = text.includes(q) ? '' : 'none';
            });
            
            document.querySelectorAll('.category-section').forEach(section => {
              const visible = [...section.querySelectorAll('.produs')]
                .some(c => c.style.display !== 'none');
              section.style.display = visible ? '' : 'none';
            });
          });
        } else {
          loadProducts();
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const category = this.dataset.category;
            loadProducts(category);
          });
        });

        // Search functionality
        document.querySelector('.search-box button').addEventListener('click', function() {
          const query = document.getElementById('search-input').value.trim();
          if (query) {
            window.location.href = `Home.html?search=${encodeURIComponent(query)}`;
          }
        });
      });
    </script>
  </main>
<script src="content.js"></script>
  <script src="theme.js"></script>
</body>
</html>
