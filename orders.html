<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comenzile mele — Magazinul Meu</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style1.css">
</head>
<body>
  <aside class="sidebar">

  </aside>

  <main class="page">
    <header class="navbar">
      <div class="navbar-actions" style="display:flex; align-items:center; gap:12px; margin-left:auto;">
        <div class="search-box" style="display:flex; align-items:center; gap:6px;">
          <input type="text" id="search-input" placeholder="Caută produse" style="padding:8px 10px; border-radius:8px; border:1px solid #ccc;">
          <button type="button" style="padding:8px 10px; border-radius:8px; border:none; cursor:pointer; background:var(--accent-bg); color:var(--accent-foreground);">🔍</button>
        </div>

        <button id="cart-btn" type="button" style="position:relative; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; background:var(--accent-bg); color:var(--accent-foreground);">
          🛒
          <span id="cart-badge" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px; display:none;">0</span>
        </button>
      </div>
    </header>

    <h1>Comenzile mele</h1>

    <div id="loading-spinner" class="loading-spinner hidden">
      <div class="spinner"></div>
      <p>Se încarcă comenzile...</p>
    </div>

    <div id="error-message" class="error-message hidden">
      <p id="error-text"></p>
      <button onclick="location.reload()">Încearcă din nou</button>
    </div>

    <div class="produse" id="orders-container"></div>

    <div id="cart-panel" style="display:none; position:fixed; top:0; right:0; width:340px; max-width:90vw; height:100vh; background:rgba(255,255,255,0.98); backdrop-filter:blur(10px); box-shadow:-10px 0 40px rgba(0,0,0,0.2); z-index:9999; overflow-y:auto; padding:20px; gap:16px; flex-direction:column;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="margin:0; font-size:1.25rem;">Coș de cumpărături</h2>
        <button id="close-cart-btn" type="button" style="border:none; background:none; font-size:1.5rem; cursor:pointer; line-height:1;">×</button>
      </div>
      <div id="cart-items" style="display:grid; gap:12px; min-height:120px; flex:1; overflow-y:auto; color:#111;"></div>
      <div style="margin-top:auto;">
        <p style="font-weight:700; margin-bottom:8px; color:#111;">Total produse: <span id="cart-total-items">0</span></p>
        <p style="font-weight:700; margin-bottom:12px; color:#111;">Total preț: <span id="cart-total-price">$0.00</span></p>
        <button id="finalize-order-btn" type="button" style="width:100%; padding:12px 14px; border-radius:10px; border:none; cursor:pointer; background:#28a745; color:#fff; margin-bottom:8px;">Finalizează comanda</button>
        <button id="clear-cart-btn" type="button" style="width:100%; padding:12px 14px; border-radius:10px; border:none; cursor:pointer; background:#111; color:#fff;">Golește coșul</button>
      </div>
      <div id="checkout-form-container" style="display:none; margin-top:16px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding:20px; border-radius:15px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);">
        <h3 style="margin:0 0 20px; color:#333; font-size:1.5rem; text-align:center; font-weight:600;">Finalizează comanda</h3>
        <form id="checkout-form" style="display:flex; flex-direction:column; gap:15px;">
          <div style="display:flex; gap:10px;">
            <div style="flex:1;">
              <label for="first-name" style="display:block; margin-bottom:5px; color:#555; font-weight:500;">Prenume</label>
              <input type="text" id="first-name" name="first-name" required style="width:100%; padding:12px; border:2px solid #e1e5e9; border-radius:8px; font-size:1rem; transition: border-color 0.3s; box-sizing:border-box;" placeholder="Introdu prenumele">
            </div>
            <div style="flex:1;">
              <label for="last-name" style="display:block; margin-bottom:5px; color:#555; font-weight:500;">Nume</label>
              <input type="text" id="last-name" name="last-name" required style="width:100%; padding:12px; border:2px solid #e1e5e9; border-radius:8px; font-size:1rem; transition: border-color 0.3s; box-sizing:border-box;" placeholder="Introdu numele">
            </div>
          </div>
          <div>
            <label for="address" style="display:block; margin-bottom:5px; color:#555; font-weight:500;">Adresă</label>
            <input type="text" id="address" name="address" required style="width:100%; padding:12px; border:2px solid #e1e5e9; border-radius:8px; font-size:1rem; transition: border-color 0.3s; box-sizing:border-box;" placeholder="Introdu adresa completă">
          </div>
          <div>
            <label for="postal-code" style="display:block; margin-bottom:5px; color:#555; font-weight:500;">Cod poștal</label>
            <input type="text" id="postal-code" name="postal-code" required style="width:100%; padding:12px; border:2px solid #e1e5e9; border-radius:8px; font-size:1rem; transition: border-color 0.3s; box-sizing:border-box;" placeholder="Introdu codul poștal">
          </div>
          <div>
            <label for="card-number" style="display:block; margin-bottom:5px; color:#555; font-weight:500;">Număr card</label>
            <input type="text" id="card-number" name="card-number" required style="width:100%; padding:12px; border:2px solid #e1e5e9; border-radius:8px; font-size:1rem; transition: border-color 0.3s; box-sizing:border-box;" placeholder="1234 5678 9012 3456">
          </div>
          <div style="display:flex; gap:10px;">
            <div style="flex:1;">
              <label for="expiry" style="display:block; margin-bottom:5px; color:#555; font-weight:500;">Data expirării</label>
              <input type="text" id="expiry" name="expiry" required style="width:100%; padding:12px; border:2px solid #e1e5e9; border-radius:8px; font-size:1rem; transition: border-color 0.3s; box-sizing:border-box;" placeholder="MM/YY">
            </div>
            <div style="flex:1;">
              <label for="cvv" style="display:block; margin-bottom:5px; color:#555; font-weight:500;">CVV</label>
              <input type="text" id="cvv" name="cvv" required style="width:100%; padding:12px; border:2px solid #e1e5e9; border-radius:8px; font-size:1rem; transition: border-color 0.3s; box-sizing:border-box;" placeholder="123">
            </div>
          </div>
          <button type="submit" style="padding:12px 14px; border-radius:10px; border:none; cursor:pointer; background:#28a745; color:#fff; font-weight:600;">Plătește</button>
        </form>
      </div>
    </div>

    <script src="api.js"></script>
    <script src="cart.js"></script>
    <script src="home-content.js"></script>
    <script src="content.js"></script>
    <script>
      class OrdersManager {
        constructor() {
          this.container = document.getElementById('orders-container');
          this.loadingSpinner = document.getElementById('loading-spinner');
        }

        loadOrders() {
          const orders = JSON.parse(localStorage.getItem('dressShopOrders') || '[]');
          return orders;
        }

        getStatus(orderDate) {
          const now = new Date();
          const orderTime = new Date(orderDate);
          const diffSeconds = (now - orderTime) / 1000;

          if (diffSeconds < 10) return 'Plasată';
          if (diffSeconds < 20) return 'În procesare';
          if (diffSeconds < 300) return 'Expediată';
          return 'Livrată';
        }

        renderOrders() {
          const orders = this.loadOrders();
          this.container.innerHTML = '';

          if (orders.length === 0) {
            this.container.innerHTML = '<p>Nu aveți comenzi încă.</p>';
            return;
          }

          let updated = false;
          orders.forEach(order => {
            const newStatus = this.getStatus(order.date);
            if (order.status !== newStatus) {
              order.status = newStatus;
              updated = true;
            }
            const status = order.status;
            const orderDate = new Date(order.date).toLocaleString('ro-RO');

            const orderElement = document.createElement('div');
            orderElement.className = 'order-card';

            let itemsHtml = '';
            order.items.forEach(item => {
              itemsHtml += `
                <li class="order-item">
                  <img src="${item.img || ''}" alt="${item.name}" class="order-item-img">
                  <div class="order-item-details">
                    <strong>${item.name}</strong> (x${item.quantity}) - ${item.price}
                  </div>
                </li>
              `;
            });

            orderElement.innerHTML = `
              <div class="order-header">
                <h3>Comanda #${order.id}</h3>
              </div>
              <div class="order-details">
                <p><strong>Data:</strong> ${orderDate}</p>
                <p><strong>Total:</strong> $${order.total.toFixed(2)}</p>
                <p><strong>Adresă livrare:</strong> ${order.customer.firstName} ${order.customer.lastName}, ${order.customer.address}, ${order.customer.postalCode}</p>
              </div>
              <div class="order-status-container">
                <span class="order-status status-${status.toLowerCase().replace(' ', '-')}">${status}</span>
              </div>
              <div class="order-products">
                <strong>Produse:</strong>
                <ul>${itemsHtml}</ul>
              </div>
            `;

            this.container.appendChild(orderElement);
          });

          if (updated) {
            localStorage.setItem('dressShopOrders', JSON.stringify(orders));
          }
        }

        start() {
          this.loadingSpinner.classList.remove('hidden');
          setTimeout(() => {
            this.loadingSpinner.classList.add('hidden');
            this.renderOrders();
            setInterval(() => this.renderOrders(), 5000);
          }, 500);
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        const ordersManager = new OrdersManager();
        ordersManager.start();
      });
    </script>
  </main>
</body>
</html></content>
